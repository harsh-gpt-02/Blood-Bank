<body>
  <div class="container">
    <div class="logo">
      <i class="fas fa-tint"></i>
      <h2>JharJeevan</h2>
    </div>
    <h3>Reset Password</h3>
    <p>Enter your new password below</p>

    <div class="input-group">
      <label>New Password</label>
      <input type="password" id="newPass" placeholder="Enter new password (min. 6 characters)">
    </div>

    <div class="input-group">
      <label>Confirm Password</label>
      <input type="password" id="confirmPass" placeholder="Confirm your new password">
    </div>

    <button onclick="resetPass()">Update Password</button>

    <div class="back-link">
      <a href="admin-login.html">← Back to Login</a>
    </div>

    <div id="msgBox" class="msg"></div>
  </div>

  <script src="https://kit.fontawesome.com/a076d05399.js"></script>
  <script>
    async function resetPass() {
      const token = new URLSearchParams(window.location.search).get('token');
      const newPassword = document.getElementById('newPass').value.trim();
      const confirmPassword = document.getElementById('confirmPass').value.trim();
      const msgBox = document.getElementById('msgBox');

      msgBox.style.display = "none";
      msgBox.className = "msg";

      if (!token) {
        msgBox.textContent = "Invalid reset link. Please request a new one.";
        msgBox.className = "msg error";
        return;
      }

      if (!newPassword) {
        msgBox.textContent = "Please enter a new password.";
        msgBox.className = "msg error";
        return;
      }

      if (newPassword.length < 6) {
        msgBox.textContent = "Password must be at least 6 characters.";
        msgBox.className = "msg error";
        return;
      }

      if (newPassword !== confirmPassword) {
        msgBox.textContent = "Passwords do not match.";
        msgBox.className = "msg error";
        return;
      }

      try {
        const res = await fetch(`/api/admin/reset/${token}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ newPassword })
        });

        const data = await res.json();

        if (!res.ok) {
          msgBox.textContent = data.message || "Something went wrong.";
          msgBox.className = "msg error";
        } else {
          msgBox.textContent = "Password reset successful! Redirecting to login...";
          msgBox.className = "msg success";

          setTimeout(() => {
            window.location.href = "admin-login.html";
          }, 2000);
        }
      } catch (err) {
        msgBox.textContent = "Server error. Please try again later.";
        msgBox.className = "msg error";
      }
    }
  </script>
</body>
